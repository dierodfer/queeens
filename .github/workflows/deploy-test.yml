name: Deploy Test to GitHub Pages

on:
  workflow_dispatch:
  pull_request:
    types: [labeled]

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy-test:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'preview-test'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /queeens/queeens-test/
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Publish to gh-pages/queeens-test (preserving production root)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PREVIEW_REF: ${{ github.event.pull_request.head.ref || github.ref_name }}
          PREVIEW_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir publish && cd publish
          git init -q
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch -q origin gh-pages
            git checkout -q -b gh-pages FETCH_HEAD
          else
            git checkout -q --orphan gh-pages
          fi

          # Replace only the queeens-test/ directory, leave everything else untouched
          rm -rf queeens-test
          mkdir queeens-test
          cp -r ../dist/. queeens-test/

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -q -m "Deploy /queeens/queeens-test/ from ${PREVIEW_REF} (${PREVIEW_SHA::7})"
            git push -q origin gh-pages
          fi
