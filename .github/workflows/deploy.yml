name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: |
          npm run build
          cp dist/index.html dist/404.html

      - name: Publish to gh-pages (root, preserving queeens-test/)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir publish && cd publish
          git init -q
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git fetch -q origin gh-pages
            git checkout -q -b gh-pages FETCH_HEAD
          else
            git checkout -q --orphan gh-pages
          fi

          # Replace production (root) files, keep the queeens-test/ subsite intact
          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'queeens-test' -exec rm -rf {} +
          cp -r ../dist/. .
          touch .nojekyll

          git add -A
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -q -m "Deploy /queeens/ (${GITHUB_SHA::7})"
            git push -q origin gh-pages
          fi
